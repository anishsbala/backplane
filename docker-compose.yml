services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  coordinator:
    build: .
    depends_on:
      - redis
    ports:
      - "50051:50051"
    command: ["./build/backplane_server", "0.0.0.0:50051", "redis", "6379", "5"]

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    depends_on:
      - coordinator
    ports:
      - "8080:8080"
    environment:
      - COORDINATOR_ADDR=coordinator:50051

  worker-a:
    build: .
    depends_on:
      - coordinator
    profiles: ["workers"]
    command: ["./build/backplane_worker", "coordinator:50051", "worker-a", "--sleep-ms", "120"]

  worker-b:
    build: .
    depends_on:
      - coordinator
    profiles: ["workers"]
    command: ["./build/backplane_worker", "coordinator:50051", "worker-b", "--sleep-ms", "160"]
